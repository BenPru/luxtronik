# Separate workflow for posting coverage comments on PRs.
# This is intentionally decoupled from the test workflow for security:
# pull_request events from forks receive a read-only GITHUB_TOKEN,
# so writing PR comments must happen via workflow_run which runs
# in the context of the base repository with write permissions.
name: Coverage PR Comment

on:
  workflow_run:
    workflows: ["Luxtronik Integration Tests"]
    types: [completed]

permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Code Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          format: markdown
          output: both
          badge: true
          hide_complexity: true

      - name: Find PR number
        id: find-pr
        run: |
          PR_NUMBER=$(gh api \
            "/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}" \
            --jq '.pull_requests[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for this workflow run"
            exit 0
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add coverage PR comment
        if: steps.find-pr.outputs.pr_number
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          number: ${{ steps.find-pr.outputs.pr_number }}
          recreate: true
          path: code-coverage-results.md
